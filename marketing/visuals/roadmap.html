<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>10-Week RPG Map</title>
<style>
  @font-face {
    font-family: "Galmuri11";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Galmuri11.woff2") format("woff2");
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px; height: 720px; overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(244,200,75,0.06), transparent),
      linear-gradient(180deg, #0d1138 0%, #07091f 100%);
    color: #fff;
    font-family: "Galmuri11", "Pretendard Variable", sans-serif;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(244,200,75,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,200,75,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .wrap {
    position: relative; width: 100%; height: 100%;
    padding: 56px 72px 40px;
    display: flex; flex-direction: column;
  }
  .badge {
    display: inline-block;
    font-size: 16px; letter-spacing: 0.2em; color: #f4c84b;
    border: 1px solid rgba(244,200,75,0.5);
    padding: 5px 14px; border-radius: 2px;
    align-self: flex-start;
  }
  h1 {
    font-size: 56px; color: #f4c84b; line-height: 1.05;
    margin-top: 16px;
    text-shadow: 0 0 28px rgba(244,200,75,0.5), 5px 5px 0 rgba(0,0,0,0.55);
    letter-spacing: -0.01em;
  }
  .map {
    flex: 1;
    margin-top: 36px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: 1fr 1fr;
    gap: 22px 28px;
    align-items: center;
  }
  .node {
    background: linear-gradient(180deg, #1a1e4d 0%, #14163d 100%);
    border: 2px solid rgba(244,200,75,0.4);
    border-radius: 10px;
    padding: 16px 14px 14px;
    text-align: center;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 8px 0 rgba(0,0,0,0.35);
    position: relative;
  }
  .node .icon {
    font-size: 50px; line-height: 1; display: block;
    margin: 4px 0 10px;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,0.5));
  }
  .node .id { font-size: 24px; color: #f4c84b; letter-spacing: 0.08em; }
  .node .name {
    font-size: 13px; color: #cfd6f5; margin-top: 5px; line-height: 1.3;
    font-family: "Pretendard Variable", sans-serif;
  }
  .node.pre {
    border-color: rgba(168,176,216,0.45);
    background: linear-gradient(180deg, #1a1e4d 0%, #11143a 100%);
  }
  .node.pre .id { color: #a8b0d8; }
  .node.magic {
    border-color: rgba(192,132,252,0.6);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 0 22px rgba(192,132,252,0.28),
      0 8px 0 rgba(0,0,0,0.35);
  }
  .node.magic .id { color: #c084fc; }
  .node.boss {
    border: 2px solid #e85d75;
    background: linear-gradient(180deg, #2a1530 0%, #1a0820 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 0 32px rgba(232,93,117,0.5),
      0 8px 0 rgba(0,0,0,0.35);
  }
  .node.boss .id { color: #ff8da0; }
  .node.boss::before {
    content: "FINAL BOSS";
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.2em;
    background: #e85d75; color: #fff;
    padding: 3px 10px; border-radius: 2px;
    white-space: nowrap;
  }
  .node.bonus {
    border: 2px dashed rgba(102,232,156,0.55);
    background: transparent;
  }
  .node.bonus .id { color: #66e89c; }
  .node.bonus .icon { filter: drop-shadow(0 0 14px rgba(102,232,156,0.5)); }
  .legend {
    display: flex; gap: 28px; justify-content: center;
    margin-top: 22px; font-size: 14px; color: #a8b0d8;
    font-family: "Pretendard Variable", sans-serif;
  }
  .legend span::before {
    content: "■"; margin-right: 6px;
  }
  .legend .l-pre::before  { color: #a8b0d8; }
  .legend .l-base::before { color: #f4c84b; }
  .legend .l-mag::before  { color: #c084fc; }
  .legend .l-boss::before { color: #e85d75; }
  .legend .l-bonus::before { color: #66e89c; }
</style>
</head>
<body>
<div class="wrap">
  <span class="badge">▶ 10-WEEK MISSION TREE</span>
  <h1>10주 RPG 로드맵 — W10 FINAL BOSS</h1>

  <div class="map">
    <div class="node pre">
      <span class="icon">📚</span>
      <div class="id">Pre</div>
      <div class="name">SQL · Git · Java</div>
    </div>
    <div class="node">
      <span class="icon">🍃</span>
      <div class="id">W1</div>
      <div class="name">Spring Boot</div>
    </div>
    <div class="node">
      <span class="icon">🗂️</span>
      <div class="id">W2</div>
      <div class="name">JPA · N+1</div>
    </div>
    <div class="node">
      <span class="icon">📝</span>
      <div class="id">W3</div>
      <div class="name">이력서 ①</div>
    </div>
    <div class="node">
      <span class="icon">🔍</span>
      <div class="id">W4</div>
      <div class="name">인덱스</div>
    </div>
    <div class="node">
      <span class="icon">🔒</span>
      <div class="id">W5</div>
      <div class="name">동시성·락</div>
    </div>

    <div class="node">
      <span class="icon">📊</span>
      <div class="id">W6</div>
      <div class="name">프로파일링</div>
    </div>
    <div class="node">
      <span class="icon">💎</span>
      <div class="id">W7</div>
      <div class="name">Redis 캐시</div>
    </div>
    <div class="node magic">
      <span class="icon">✨</span>
      <div class="id">W8</div>
      <div class="name">AI Native</div>
    </div>
    <div class="node magic">
      <span class="icon">⚔️</span>
      <div class="id">W9</div>
      <div class="name">팀 프로젝트</div>
    </div>
    <div class="node boss">
      <span class="icon">🐉</span>
      <div class="id">W10</div>
      <div class="name">면접 BOSS</div>
    </div>
    <div class="node bonus">
      <span class="icon">🏆</span>
      <div class="id">+α</div>
      <div class="name">취업·이직</div>
    </div>
  </div>

  <div class="legend">
    <span class="l-pre">Pre · 사전학습</span>
    <span class="l-base">W1~7 · 기본기</span>
    <span class="l-mag">W8~9 · AI · 팀</span>
    <span class="l-boss">W10 · FINAL BOSS</span>
    <span class="l-bonus">+α · 취업</span>
  </div>
</div>
</body>
</html>
